services:
  - type: web
    name: remotixy
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start -- -p $PORT
    envVars:
      - key: NODE_ENV
        value: production
      - key: GOOGLE_AI_API_KEY
        sync: false
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: remotixy-api
          property: host

  - type: web
    name: remotixy-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py migrate && python manage.py collectstatic --noinput
    startCommand: gunicorn remotixy_backend.wsgi:application
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: false
      - key: DJANGO_ALLOWED_HOSTS
        value: remotixy-api.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://remotixy.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://remotixy.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: remotixy-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://remotixy.onrender.com
      - key: GOOGLE_AI_API_KEY
        sync: false

databases:
  - name: remotixy-db
    plan: free
